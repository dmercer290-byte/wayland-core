# OSV-Scanner config for wayland-core.
#
# Posture (verified 2026-06-02, wasmtime now 36.0.10):
#   * 0 vulnerabilities. 0 Critical / High / Medium.
#   * The criticals OSV used to hide (wasmtime 9.2/9.0 CVSS) are FIXED at the
#     source — wasmtime + wasmtime-wasi upgraded 30 -> 36, unmaintained
#     yaml-rust dropped. Confirmed by `osv-scanner scan source -r ./`.
#   * What remains are 5 warning-class advisories (4 "unmaintained", 1
#     "unsound"), ALL transitive, each traced to its parent and each
#     genuinely irreducible without a regression or a pre-release dep. (A 6th,
#     lru, was eliminated at source via the ratatui 0.30 upgrade — see below.)
#
# Every entry below is a PUBLIC, DATED, REASONED disposition — not a silent
# mute. `ignoreUntil` forces a re-evaluation; on each dependency bump, re-run
# `osv-scanner scan source -r ./` and delete any entry whose advisory has
# cleared. An empty IgnoredVulns list is the goal whenever the ecosystem
# allows it.
#
# Parent trace recipe: `cargo tree -i <crate>@<ver> --all-features --target all`.

# ── paste 1.0.15 (unmaintained) ──────────────────────────────────────────
# Multi-parent and irreducible: pulled by the candle ML SIMD stack
# (gemm/gemm-common/pulp <- candle-core <- candle-transformers, used by
# wcore-memory for local embeddings) AND by ratatui. No maintained drop-in
# replacement exists; the macro is build-time only (proc-macro, no runtime
# surface). Re-evaluate when candle or ratatui drop it.
[[IgnoredVulns]]
id = "RUSTSEC-2024-0436"
ignoreUntil = "2026-09-02T00:00:00Z"
reason = "paste: build-time proc-macro, no runtime surface; multi-parent (candle SIMD stack + ratatui), no maintained replacement. Tracked; revisit on candle/ratatui bump."

