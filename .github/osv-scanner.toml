# syntect itself moves off bincode 1.x.
[[IgnoredVulns]]
id = "RUSTSEC-2025-0141"
ignoreUntil = "2026-09-02T00:00:00Z"
reason = "bincode 1.x: syntect 5.3.0 (latest) dump-format dep; no newer syntect exists. Tracked; revisit on syntect release."

