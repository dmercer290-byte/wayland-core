[package]
name = "wcore-agent"
description = "Agent engine, session management, output sinks, and orchestration for genesis-core"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
wcore-types.workspace     = true
wcore-protocol.workspace  = true
wcore-config.workspace    = true
wcore-providers.workspace = true
wcore-egress.workspace = true
wcore-tools.workspace     = true
# #327: bootstrap installs the config-sourced sandbox toggle
# (`[tools] sandbox` / `allow_no_sandbox`) via `set_config_sandbox`.
wcore-sandbox.workspace   = true
wcore-mcp.workspace       = true
wcore-skills.workspace    = true
# v0.8.0 Task K ‚Äî wire `TemplateRouter` as primary orchestration-template
# selector with `IntentClassifier` as deterministic cold-start fallback.
# Already transitively pulled via wcore-skills; declaring directly keeps
# the `orchestration::template_routing` import edge explicit.
wcore-dispatch.workspace  = true
# v0.8.1 U1 ‚Äî bridge to GEPA's `PromptStore` so the per-turn
# `SkillRouter` can hydrate Beta priors from `evolved_prompts`
# winners at bootstrap. `wcore-evolve` is a LEAF below
# `wcore-memory`/`wcore-skills`/`wcore-providers`/`wcore-eval`, none of
# which depend on `wcore-agent`, so this edge does not introduce a
# cycle.
wcore-evolve.workspace    = true
wcore-swarm.workspace          = true
wcore-agents-pack.workspace = true
wcore-memory.workspace    = true
wcore-user-model.workspace = true
# v0.8.0 Task H ‚Äî selectable user-model backend (local vs honcho) at bootstrap.
wcore-honcho-adapter.workspace = true
wcore-compact.workspace       = true
wcore-plugin-api.workspace    = true
# v0.6.5 Task 2.7 ‚Äî host wire-up needs both new runner crates so the
# loader can route `PluginIdentity::Wasm` / `Subprocess` / `mcp-bridge`
# manifests through the right runtime. Both edges are LEAF in the
# dependency graph (api-only seams; no cycle introduced).
wcore-plugin-wasm.workspace       = true
wcore-plugin-subprocess.workspace = true
wcore-observability.workspace = true
# M5.3: ExecutionBudget + ExecutionBudgetView extracted into wcore-budget;
# `wcore_agent::budget` re-exports them. New BudgetTracker / BudgetCap /
# BudgetEvent surfaces are also reached via this dep.
wcore-budget.workspace        = true
# W7 (v0.6.3) ‚Äî the per-turn budget charge resolves cost from the
# `wcore-pricing` provider√ómodel catalog. A catalog miss falls back to
# the `ProviderCompat` heuristic in `wcore-observability::cost`.
wcore-pricing.workspace       = true
# Wave BR ‚Äî host adapter `plugins::adapters::browser_adapter` translates
# `BrowserToolSpec` from a loaded `genesis-browser` plugin into a real
# `BrowserTool` via `wcore_browser::adapter::from_spec`. Plugin shells
# still cannot depend on `wcore-browser` (audit F2); the host can.
wcore-browser.workspace       = true
# Wave CU ‚Äî host adapter `plugins::adapters::cua_adapter` reifies
# `CuaToolSpec` plugin payloads into real `wcore_cua::CuaTool` instances.
# Same audit-F2 asymmetry as BR: plugin shells cannot depend on
# `wcore-cua`, but the host can.
wcore-cua.workspace           = true
# v0.6.1 hardening (CRIT-1) ‚Äî install the M5.8/M5.9 permissions layer
# at the tool-dispatch boundary. Without this dep, wcore-permissions
# shipped as orphan code in v0.6.0 and the ACL never enforced.
wcore-permissions.workspace   = true
# v0.8.1 U5 ‚Äî channel auto-registration. Scans
# `~/.genesis/channels/*.toml` at engine boot and registers each
# adapter (Slack / Telegram / Email / Discord / SMS / WhatsApp /
# Signal) into a `ChannelManager`. Without this dep the 7 channel
# crates ship as orphan code; every deploy has to hand-wire them.
wcore-channels.workspace          = true
wcore-channels-registry.workspace = true
# v0.8.1 U7 ‚Äî production wire-up for `wcore-cron`. `bootstrap.rs` spawns
# a `CronRunner` with an `EngineJobHandler` (see `cron.rs`) so cron
# jobs persisted via the `genesis-core cron` CLI fire when the engine
# is running.
wcore-cron.workspace              = true
# v0.6.5 Task 1.5 ‚Äî host adapter `plugins::apply::deliver_user_models`
# translates each `CapturedUserModel` into a live `HonchoClient` via
# `HonchoClient::from_spec`. Same audit-F2 asymmetry as wcore-browser /
# wcore-cua: plugin shells cannot depend on `wcore-agent`, but the host
# can depend on plugin shells.
genesis-honcho.workspace      = true

tokio.workspace       = true
futures.workspace     = true
serde.workspace       = true
serde_json.workspace  = true
serde_yaml.workspace  = true
async-trait.workspace = true
anyhow.workspace      = true
thiserror.workspace   = true
regex.workspace       = true
glob.workspace        = true
# Declarative workflow DSL front-end (orchestration/workflow/dsl.rs) ‚Äî
# parses RON and lowers it onto the existing `GraphConfig` IR.
ron.workspace         = true
chrono.workspace      = true
dirs.workspace        = true
uuid.workspace        = true
crossterm.workspace   = true
is-terminal.workspace = true
tracing.workspace     = true

# W8a A.2: ExecutionBudget runtime state behind a synchronous lock + CancellationToken
parking_lot.workspace = true
tokio-util.workspace  = true

# W8b D.2: filesystem watcher (notify-rs) for external-edit detection.
notify.workspace = true

# v0.6.3 D.0: real HTTP backends for the API-seam catalog tools
# (github/gitlab/linear/notion) ‚Äî see `tool_backends`.
reqwest.workspace = true

# Wave SD: SHA-256 for FileHistory.byte_digest (replacing collidable
# 64-bit DefaultHasher). Closes SECURITY MAJOR #17.
sha2.workspace = true

# Sec6: ed25519 plugin signature verification
ed25519-dalek.workspace = true
base64.workspace = true

# v0.9.0 Wave-1 B0 ‚Äî OAuth subsystem (Google Meet / future PKCE flows).
# Listener (hyper) binds an ephemeral localhost port for the redirect_uri
# callback; `open` launches the user's browser at the consent URL;
# urlencoding percent-encodes query params; subtle guarantees
# constant-time `state` token comparison so timing leaks cannot bypass CSRF.
# `rand` (already a dev-dep) is promoted to a runtime dep because OAuth
# state + PKCE verifier generation are runtime paths, not test paths.
hyper.workspace        = true
hyper-util.workspace   = true
# Inbound webhook host (`inbound_webhook.rs`) ‚Äî axum 0.7 Router over a
# tokio TcpListener routes `POST/GET /webhooks/:channel` to the matching
# channel's `Channel::ingest_webhook`. Already in the workspace lockfile via
# wcore-cli / wcore-acp (both declare axum 0.7 directly), so this adds no
# new transitive deps.
axum = "0.7"
open.workspace         = true
urlencoding.workspace  = true
subtle.workspace       = true
# Dual-stack loopback callback bind (see workspace Cargo.toml note): used by
# `OAuthFlow::bind_callback_listener` when the redirect host is `localhost`.
socket2.workspace      = true
rand.workspace         = true
# B2 egress policy: registrable-domain (eTLD+1) extraction for allowlist
# matching + URL parsing for the exfil-shape classifier.
url.workspace          = true
psl.workspace          = true

# v0.9.0 W1 sub-agent backends (B1-B12 wave1-rescue):
# - tempfile: atomic file writes (B2 tts, B3 video frame extraction)
# - tar + flate2: Piper voice .tar.gz extraction (B11)
# - tokio-postgres: real Postgres schema introspection (B8)
# - cpal + hound: voice_mode mic capture (B10) ‚Äî cpal wraps the OS audio
#   API (CoreAudio / WASAPI / ALSA) in pure Rust with no PortAudio system
#   dep; hound writes the captured PCM samples to a WAV file the
#   transcription backend can upload.
tempfile.workspace     = true
tar.workspace          = true
flate2.workspace       = true
tokio-postgres.workspace = true
# rank-42 ‚Äî TLS for `sslmode=require`/`verify-ca`/`verify-full` managed
# Postgres. `tokio-postgres-rustls` provides `MakeRustlsConnect`; `rustls`
# builds the `ClientConfig`; `webpki-roots` is the public-CA trust store.
# Matches the workspace rustls 0.23 / tokio-rustls 0.26 stack ‚Äî no openssl.
tokio-postgres-rustls.workspace = true
rustls.workspace = true
webpki-roots.workspace = true
# Issue #14 ‚Äî voice_mode mic-capture deps. Optional + gated behind the
# off-by-default `voice` feature so the default binary does NOT link the OS
# audio lib (libasound.so.2 / ALSA on Linux), which must not be a hard
# runtime dependency of a TUI. Enable with `--features voice`.
cpal  = { workspace = true, optional = true }
hound = { workspace = true, optional = true }

workspace-hack.workspace = true

[features]
# W7 Pre-flight 0.0e: opt-in test-driver helpers (ScriptedProvider,
# TestSink, run_synthetic_turn, build_for_test) for downstream
# integration tests. Pulls in `wcore-memory/test-utils` for the
# `open_for_test` in-memory backend.
test-utils = ["wcore-memory/test-utils"]
# W12 (debt B.4-tokens): enables the `--live-api` path inside the
# `tool_token_bench` binary. Off by default ‚Äî the scripted path is the
# CI baseline. Live mode requires real API keys; see
# `docs/tool-token-empirical-2026-05-15.md` ¬ß2.
live-api  = []
# M2.6 ‚Äî live-API tests that actually hit the provider HTTPS endpoint.
# Default CI does NOT compile or run these. To enable locally:
#   cargo nextest run -p wcore-agent --features live-anthropic,live-openai,live-bedrock --test e2e
# With the feature ON, a missing API key PANICS rather than skipping.
live-anthropic = []
live-openai    = []
live-bedrock   = []
# v0.9.0 W1 B11: opt-in Piper local TTS synthesis path. OFF by default
# (TTS gates through OpenAI/ElevenLabs cloud backends from B2). When ON,
# build_tts_backend falls through to a local Piper backend if voices are
# downloaded. Synthesis runtime is stubbed for v0.9.0 ‚Äî turning the
# feature on does not yet produce audio. Wire-up tracked for v0.9.1.
piper_tts      = []
# Issue #14 ‚Äî voice_mode mic capture (cpal + hound). OFF by default: cpal
# links the OS audio library (ALSA/libasound.so.2 on Linux, CoreAudio on
# macOS, WASAPI on Windows). A TUI must not hard-require ALSA at runtime, so
# the default binary is built without it. Enable voice input with
# `cargo build -p wcore-cli --features voice` (wcore-cli re-exports this).
voice          = ["dep:cpal", "dep:hound"]

[dev-dependencies]
# Self-reference with test-utils feature so wcore-agent's own
# integration tests can use ScriptedProvider/TestSink/build_for_test
# (W7 Pre-flight 0.0d).
wcore-agent = { path = ".", features = ["test-utils"] }
wcore-mcp = { path = "../wcore-mcp", features = ["test-utils"] }
# Wave OL: end-to-end wiremock smoke through `OllamaProvider`
# (`tests/ollama_e2e_test.rs`). Dev-only ‚Äî no runtime dep edge.
genesis-ollama = { path = "../genesis-ollama" }
# C1 / Task A4: end-to-end SessionStart prelude test reads the real
# `genesis_ijfw::hooks::HOOKS` constant + `mcp::SERVER_NAME` so a rename in
# the plugin breaks the e2e proof. Dev-only ‚Äî genesis-ijfw depends solely on
# wcore-plugin-api/types/protocol (audit F2), so this edge is ACYCLIC and the
# plugin's own `[dependencies]` are untouched.
genesis-ijfw = { path = "../genesis-ijfw" }
wiremock.workspace    = true
tokio-test.workspace  = true
tempfile.workspace    = true
mockall.workspace     = true
rstest.workspace      = true
serial_test.workspace = true
inventory.workspace   = true
criterion.workspace   = true

# ‚îÄ‚îÄ Integration test binaries ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
[[test]]
name = "e2e"
path = "tests/e2e/mod.rs"
# E2E tests require real API keys; run via: cargo nextest run --profile e2e --test e2e

[[test]]
name = "acceptance"
path = "tests/acceptance/mod.rs"
# Acceptance tests for evolution features; run via: cargo nextest run --profile e2e --test acceptance

# ‚îÄ‚îÄ W12 (debt B.4-tokens): tool-token measurement harness ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# Lives in wcore-agent because it dispatches through
# `execute_tool_calls_with_budget` + uses `test_utils::ScriptedProvider`.
# Built only when the `test-utils` feature is on so the released
# genesis-core binary doesn't carry it.
[[bin]]
name              = "tool_token_bench"
path              = "src/bin/tool_token_bench.rs"
required-features = ["test-utils"]

[[bench]]
name    = "orchestration_graph_bench"
harness = false

