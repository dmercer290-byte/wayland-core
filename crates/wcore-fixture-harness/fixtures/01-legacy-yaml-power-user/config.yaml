# Source: ~/.genesis/config.yaml shape (IJFW-era legacy format, Desktop app writes)
# This archetype tests: yaml config load path (B-11), Desktop-app cron alias (B-3),
# dual-config coexistence (B-11), multi-MCP server env hermeticity (B-9).

model:
  default: anthropic/claude-opus-4.6
  provider: auto
  base_url: https://openrouter.ai/api/v1
candid_mode:
  enabled: false
  scope: local
  max_retries: 3
  converters:
    - homoglyph
    - leet
    - unicode_tag
terminal:
  backend: local
  cwd: .
  timeout: 180
  docker_mount_cwd_to_workspace: false
  lifetime_seconds: 300
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200
  container_persistent: true
browser:
  inactivity_timeout: 120
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6
session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4
group_sessions_per_user: true
streaming:
  enabled: false
skills:
  creation_nudge_interval: 15
agent:
  max_turns: 60
  verbose: false
  reasoning_effort: medium
