[plugin]
name        = "genesis-honcho"
version     = "0.1.0"
description = "Honcho user-model backend (mock-by-default; live HTTP via HONCHO_API_KEY)"
entry       = "builtin:genesis_honcho"
authors     = ["Genesis-Core"]
