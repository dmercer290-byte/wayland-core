# Genesis Core — Bundled Provider Catalog
# ========================================
# Data-driven OpenAI-compatible provider registry. Each entry lets
# `--provider <id>` resolve a generic CatalogProvider (a thin wrapper over
# OpenAIProvider) WITHOUT a hand-written ProviderType match arm.
#
# Source of truth: models.dev catalog (https://models.dev/api.json), the same
# catalog OpenCode uses. Curated 2026-06-06. Only providers with a STATIC
# OpenAI-compatible base URL are included.
#
# EXCLUDED from this file:
#   - Local providers (lmstudio, atomic-chat, privatemode-ai): no fixed cloud
#     URL; covered by the existing ollama/local story.
#   - Templated-host providers (databricks, snowflake-cortex,
#     cloudflare-workers-ai): base URL contains ${ACCOUNT}/${HOST} that must be
#     substituted per-account — not expressible as a static catalog row.
#   - Anthropic-wire providers (minimax*, kimi-for-coding): not OpenAI-compat.
#
# COLLISIONS with native ProviderType arms (deepseek, fireworks-ai, nvidia,
# openrouter, perplexity-agent, moonshotai) are kept here for completeness but
# the loader MUST skip any id already owned by a native ProviderType so native
# wiring wins. See CATALOG-PLAN.md §Loader.
#
# Schema per entry:
#   id                 string  — CLI id for `--provider <id>` (unique)
#   display_name       string  — human label
#   base_url           string  — OpenAI-compatible REST root (no trailing slash)
#   env_var            string  — env var holding the API key
#   openai_compatible  bool    — always true in this file
#   api_path           string  — OPTIONAL. Path appended to base_url for chat
#                                 completions. Omitted => OpenAIProvider default
#                                 "/v1/chat/completions" (base is a bare host).
#                                 "/chat/completions" when base already ends in
#                                 a version segment (/v1, /v4, /openai, ...).
#                                 "" when base_url IS the full endpoint.

