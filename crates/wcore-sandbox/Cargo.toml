[package]
name = "wcore-sandbox"
description = "Container-isolated tool execution for genesis-core (M5.1)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

# M5.1 — sandboxed tool execution. Default build is dep-light; the Docker
# backend lives behind the `live-docker` feature so the smoke test and the
# bollard transitive graph stay out of the default workspace build.

[dependencies]
serde       = { workspace = true, features = ["derive"] }
toml.workspace        = true
thiserror.workspace   = true
tokio       = { workspace = true, features = ["rt", "macros", "time", "process", "io-util"] }
tracing.workspace     = true
async-trait.workspace = true
bollard = { version = "0.17", optional = true, default-features = false, features = ["ssl"] }
futures = { workspace = true, optional = true }
which = "6"

# Used by the sandbox-exec backend (macOS) to materialise the SBPL profile
# to disk; tiny cross-platform dep so it stays unconditional rather than
# behind a cfg.
tempfile.workspace = true

[features]
default = []
live-docker = ["dep:bollard", "dep:futures"]
# S3 — Landlock LSM ruleset applied to bwrap child via `pre_exec` (Linux-only).
# Gated so macOS/Windows CI does not need to depend on the Linux-only crate.
landlock = ["dep:landlock", "dep:libc"]
# S4 — seccomp-bpf filter compiled in-process and handed to bwrap via
# `--seccomp <fd>` (Linux-only). Gated because libseccomp-sys requires the
# system libseccomp C library at link time which is not available on macOS/
# Windows runners.
seccomp = ["dep:libseccomp", "dep:libc"]

[target.'cfg(target_os = "linux")'.dependencies]
landlock   = { version = "0.4", optional = true }
libseccomp = { version = "0.4", optional = true }
# Used by the seccomp wiring to clear FD_CLOEXEC on the BPF tempfile so it
# survives the spawn into bwrap. Pulled in only when the `seccomp` feature
# is enabled.
libc       = { workspace = true, optional = true }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = [
  "Win32_Foundation",
  "Win32_Security",
  "Win32_Security_Authorization",
  "Win32_Security_Isolation",
  "Win32_System_IO",
  "Win32_System_Threading",
  "Win32_System_JobObjects",
  "Win32_System_Pipes",
  "Win32_System_SystemInformation",
  "Win32_Storage_FileSystem",
] }

[dev-dependencies]
tempfile.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time"] }
