# cargo-audit configuration.
#
# Posture (verified 2026-06-02): `cargo audit` reports 0 vulnerabilities and
# 5 warning-class advisories (4 "unmaintained", 1 "unsound"). CI runs plain
# `cargo audit`, which does NOT fail on warning-class advisories — so the gate
# is green WITHOUT ignoring anything. (A 6th, the lru "unsound" advisory, was
# eliminated at source by the ratatui 0.29 -> 0.30 upgrade.)
#
# The ignore list is intentionally EMPTY. The 6 remaining advisories are left
# VISIBLE as warnings (not silenced) and are dispositioned — publicly, dated,
# with parent traces — in `.github/osv-scanner.toml`, which is the gating
# scanner. Duplicating those mutes here would only hide warnings we want to
# keep seeing on every run.
#
# History: a prior 18-entry wasmtime / wasmtime-wasi ignore block lived here
# while the runtime was pinned at 30.x (it masked CVSS 9.2 / 9.0 advisories).
# Those are now FIXED at the source — wasmtime + wasmtime-wasi were upgraded
# 30 -> 36.0.10 (the bindgen async-syntax migration that had blocked the bump
# is done) — so every entry in that block is satisfied and has been removed.
# Confirmed: `cargo audit` with this file's ignore list bypassed reports the
# same 6 warnings and zero wasmtime advisories.
#
# Rotation policy: on every dependency bump, re-run `cargo audit`. If a real
# vulnerability ever needs a temporary documented exception, add it to
# `ignore` below WITH a parent trace, a threat-model note, and a tracking
# item — never as a bare id.
#
# Format reference: https://docs.rs/cargo-audit/latest/cargo_audit/

[advisories]
# ── rsa 0.9.x — RUSTSEC-2023-0071 (Marvin Attack, timing sidechannel) ──────
# Parent trace (`cargo tree -i rsa`): rsa 0.9.10 <- jsonwebtoken 10.3.0, with
# TWO consumers:
#   1. wcore-channel-msteams — Bot Framework inbound JWT *verification* with
#      Microsoft's PUBLIC JWKS keys. RS256 verify never touches a private key,
#      never decrypts/signs → the vulnerable path is unreachable here.
#   2. wcore-providers (Vertex AI) — *signs* a service-account JWT (RS256) with
#      the operator's OWN RSA private key to mint a Google access token. This
#      IS a private-key op (the advisory's target surface), but practical
#      exploitability is low: signing is infrequent (token refresh ~hourly),
#      runs locally, is NOT remotely attacker-triggerable at the volume/timing
#      precision a Marvin attack needs, and exposes no timing oracle to any
#      remote party (the signature goes to Google's token endpoint, not back to
#      an attacker). No fixed `rsa` release exists ("No fixed upgrade available").
# Permanent remediation (tracked): migrate jsonwebtoken to the `aws_lc_rs`
# CryptoProvider (constant-time AWS-LC, drops the pure-Rust `rsa` crate),
# pending Windows-CI validation of the C-toolchain build — `rust_crypto` was
# chosen originally for a Windows-clean pure-Rust build.
ignore = ["RUSTSEC-2023-0071"]
